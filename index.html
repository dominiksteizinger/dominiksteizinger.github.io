<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barminik – Dominik Steizinger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0e0d0b;
      --bg2: #141210;
      --gold: #b89a5a;
      --gold-light: #d4b87a;
      --text: #e8e2d9;
      --muted: #7a7570;
      --line: rgba(184,154,90,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
    }

    /* top label */
    .eyebrow {
      font-family: 'Barlow', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    /* name block */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(52px, 10vw, 80px);
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.25s;
    }

    .name em {
      font-style: italic;
      color: var(--gold);
    }

    /* divider */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 36px 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    /* tagline */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(18px, 3.5vw, 22px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.5;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    /* contact block */
    .contact {
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.65s;
    }

    .contact-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .contact-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-value {
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact-value:hover {
      color: var(--gold-light);
    }

    /* instagram link — styled differently */
    .instagram-link {
      margin-top: 48px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      padding: 14px 24px;
      text-decoration: none;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: border-color 0.3s ease, color 0.3s ease, background 0.3s ease;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .instagram-link:hover {
      border-color: var(--gold);
      background: rgba(184,154,90,0.06);
      color: var(--gold-light);
    }

    .instagram-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* footer */
    .footer {
      margin-top: 80px;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.95s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      body { padding: 48px 20px; justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="eyebrow">Private Events · Hallein · Salzburg</div>

    <h1 class="name">
      Dominik Markus<br><em>Steizinger</em>
    </h1>

    <div class="divider"></div>

    <p class="tagline">
      Kleine Runden.<br>Handgemachte Drinks.<br>Abende, die in Erinnerung bleiben.
    </p>

    <div class="contact">
      <div class="contact-item">
        <span class="contact-label">Telefon</span>
        <a class="contact-value" href="tel:+436766823747">+43 676 68 23 747</a>
      </div>
      <div class="contact-item">
        <span class="contact-label">E-Mail</span>
        <a class="contact-value" href="mailto:steizingerdominik@gmail.com">steizingerdominik@gmail.com</a>
      </div>
    </div>

    <a class="instagram-link" href="https://www.instagram.com/sir.bar.minik/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
      </svg>
      @sir.bar.minik
    </a>

    <div class="footer">© 2026 Barminik · Dominik Steizinger</div>

  </div>
</body>
</html>
